name: Build - Build and Release WebJEA

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
      - '[0-9]+.[0-9]+.*'
    paths:
      - 'ReleaseFiles/**'
      - 'WebJEA/**'
      - 'Test/forceactions.txt'
      - '.github/workflows/build-and-release.yml'
      - '.github/workflows/build.ps1'
      - '.github/workflows/build.psake.ps1'
  pull_request:
    branches:
      - master
    paths:
      - 'ReleaseFiles/**'
      - 'WebJEA/**'
      - 'Test/forceactions.txt'
      - '.github/workflows/build-and-release.yml'
      - '.github/workflows/build.ps1'
      - '.github/workflows/build.psake.ps1'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a release (even without a tag)'
        required: false
        default: false
        type: boolean

env:
  SOLUTION_PATH: WebJEA/WebJEA.sln
  PROJECT_PATH: WebJEA/WebJEA.vbproj
  BUILD_CONFIGURATION: Release
  DOTNET_FRAMEWORK_VERSION: v4.8
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build WebJEA
    runs-on: windows-latest

    outputs:
      version: ${{ steps.build_script.outputs.version }}
      artifact_name: ${{ steps.build_script.outputs.artifact_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      - name: Build WebJEA
        id: build_script
        shell: pwsh
        run: |
          $buildResult = & "$env:GITHUB_WORKSPACE\.github\workflows\build.ps1" -OutputPath "$env:runner_temp\build-output" -BuildConfiguration ${{ env.BUILD_CONFIGURATION }}

          $version = $buildResult.Version
          $artifactName = "webjea-build-$version"

          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "artifact_name=$artifactName" >> $env:GITHUB_OUTPUT

          Write-Host "Build completed with version: $version"
          Write-Host "Artifact name: $artifactName"
        env:
          AWS_KEY: ${{ secrets.AWS_KEY }}
          AWS_KEYSEC: ${{ secrets.AWS_KEYSEC }}
          AWS_QUEUE_URL: ${{ secrets.AWS_QUEUE_URL }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build_script.outputs.artifact_name }}
          path: ${{ runner.temp }}/build-output
          retention-days: 30
          if-no-files-found: error
          compression-level: 6

  release:
    name: Create GitHub Release
    needs: build
    runs-on: windows-latest
    if: (github.event_name == 'push' && github.ref == 'refs/heads/master') || github.event.inputs.create_release == 'true'

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get commit message
        id: commit_msg
        shell: pwsh
        run: |
          if ('${{ github.event.head_commit.message }}' -ne '') {
            $commitMessage = '${{ github.event.head_commit.message }}'
          } else {
            $commitMessage = git log -1 --format=%B
          }

          # Escape for JSON and multiline
          $commitMessage = $commitMessage -replace '"', '\"' -replace "`n", '\n'
          echo "message=$commitMessage" >> $env:GITHUB_OUTPUT

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: build-output

      - name: Create release zip
        shell: pwsh
        run: |
          $version = "${{ needs.build.outputs.version }}"
          $zipName = "webjea-$version.zip"
          $sourcePath = "./build-output"
          remove-item "$sourcePath/build-info.json" -ErrorAction Ignore

          write-host "Creating archive $zipName from $sourcePath"
          Compress-Archive -path "$sourcePath/*" -DestinationPath $zipName -Force

          Write-Host "Created release archive: $zipName"
          Get-Item $zipName | Select-Object FullName, Name, Length

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: WebJEA ${{ needs.build.outputs.version }}
          tag_name: v${{ needs.build.outputs.version }}
          body: |
            WebJEA Release ${{ needs.build.outputs.version }}

            ## Commit Message
            ${{ steps.commit_msg.outputs.message }}

            [Installation Guide](https://github.com/${{ github.repository }}/wiki/Installation)
          files: webjea-${{ needs.build.outputs.version }}.zip
          draft: false
          prerelease: ${{ contains(needs.build.outputs.version, '-') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

